spring.application.name=movemate-back

# Cambiar el puerto (ejemplo: 8080)
server.port=8080

#Hacemos que ignore el docker-compose
spring.docker.compose.enabled=false

#JPA/Hibernate
# Para que Hibernate cree/modifique las tablas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# MySQL Database Config  (Persistencia)
#spring.datasource.url=jdbc:mysql://localhost:3306/movemate
#spring.datasource.username=movemate21
#spring.datasource.password=movemate21
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Base de datos persistente H2 en archivo
spring.datasource.url=jdbc:h2:file:./data/movemate-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# H2 Console habilitada
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

